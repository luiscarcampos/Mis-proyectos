<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612; --paper: #f5f0e8; --warm: #c8a96e;
    --moss: #5a6e4a; --rust: #b85c38; --mist: #8a9ba8;
    --pale: #ede8dc; --deep: #2d2520;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--paper);
    color: var(--ink); min-height: 100vh;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a96e' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* sync indicator */
  .sync-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 3px; background: transparent; transition: background 0.3s;
  }
  .sync-bar.syncing { background: linear-gradient(90deg, var(--moss), var(--warm), var(--moss)); background-size: 200%; animation: syncAnim 1s linear infinite; }
  .sync-bar.error { background: var(--rust); }
  @keyframes syncAnim { 0%{background-position:0%} 100%{background-position:200%} }

  .sync-status {
    position: fixed; bottom: 1rem; right: 1rem; z-index: 200;
    font-size: 0.72rem; padding: 5px 12px; border-radius: 20px;
    background: white; border: 1px solid rgba(200,169,110,0.3);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08); color: #999;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .sync-status.ok .sync-dot { background: var(--moss); }
  .sync-status.syncing .sync-dot { background: var(--warm); animation: pulse 1s infinite; }
  .sync-status.error .sync-dot { background: var(--rust); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  header { padding: 2rem 2rem 0; border-bottom: 1px solid rgba(200,169,110,0.3); }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; padding-bottom: 1.25rem; }
  .logo-area h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; color: var(--deep); }
  .logo-area p { font-size: 0.82rem; color: var(--warm); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; font-weight: 500; }
  .header-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
  .main-tabs { display: flex; }
  .main-tab { padding: 10px 22px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; color: #999; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .main-tab.active { color: var(--deep); border-bottom-color: var(--moss); }
  .filter-tabs { display: flex; gap: 4px; background: var(--pale); padding: 4px; border-radius: 8px; }
  .filter-tab { padding: 5px 14px; border: none; background: transparent; border-radius: 6px; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; color: #888; transition: all 0.2s; font-weight: 500; }
  .filter-tab.active { background: white; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .btn-add { background: var(--moss); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .btn-add:hover { background: #4a5c3c; }
  .page { display: none; }
  .page.active { display: block; }
  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  .stats-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat-pill { padding: 8px 16px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .s-active { background: rgba(90,110,74,0.12); color: var(--moss); } .s-active .dot { background: var(--moss); }
  .s-paused { background: rgba(138,155,168,0.15); color: var(--mist); } .s-paused .dot { background: var(--mist); }
  .s-done { background: rgba(200,169,110,0.15); color: #9a7a3e; } .s-done .dot { background: var(--warm); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
  .card { background: white; border-radius: 14px; padding: 1.4rem; border: 1px solid rgba(200,169,110,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; cursor: pointer; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:14px 0 0 14px; }
  .card.active::before { background: var(--moss); }
  .card.paused::before { background: var(--mist); }
  .card.done::before { background: var(--warm); }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .card-icon { font-size: 1.4rem; line-height: 1; margin-bottom: 0.5rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--deep); line-height: 1.3; margin-bottom: 0.3rem; }
  .card-category { font-size: 0.7rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.6rem; opacity: 0.5; }
  .card-desc { font-size: 0.84rem; color: #666; line-height: 1.55; margin-bottom: 1rem; }
  .card-progress { margin-bottom: 0.9rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #999; margin-bottom: 4px; }
  .progress-bar { height: 5px; background: var(--pale); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
  .card.active .progress-fill { background: var(--moss); }
  .card.paused .progress-fill { background: var(--mist); }
  .card.done .progress-fill { background: var(--warm); }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; flex-wrap: wrap; }
  .status-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .badge-active { background: rgba(90,110,74,0.12); color: var(--moss); }
  .badge-paused { background: rgba(138,155,168,0.15); color: var(--mist); }
  .badge-done { background: rgba(200,169,110,0.15); color: #9a7a3e; }
  .next-step { font-size: 0.72rem; color: #aaa; font-style: italic; max-width: 60%; text-align: right; }
  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #aaa; }
  .empty-state p { font-size: 0.9rem; margin-top: 0.5rem; }

  /* CALENDAR */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .cal-nav { display: flex; align-items: center; gap: 0.75rem; }
  .cal-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--deep); min-width: 210px; text-align: center; }
  .btn-nav { background: white; border: 1px solid rgba(200,169,110,0.35); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem; color: var(--ink); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-nav:hover { background: var(--pale); }
  .btn-today { width: auto !important; padding: 0 10px !important; font-size: 0.72rem !important; font-weight: 600; }
  .cal-view-tabs { display: flex; gap: 4px; background: var(--pale); padding: 4px; border-radius: 8px; }
  .cal-view-tab { padding: 5px 14px; border: none; background: transparent; border-radius: 6px; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; color: #888; transition: all 0.2s; font-weight: 500; }
  .cal-view-tab.active { background: white; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .cal-layout { display: grid; grid-template-columns: 1fr 250px; gap: 1.5rem; align-items: start; }
  .month-grid { background: white; border-radius: 14px; border: 1px solid rgba(200,169,110,0.2); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .month-weekdays { display: grid; grid-template-columns: repeat(7,1fr); background: var(--pale); border-bottom: 1px solid rgba(200,169,110,0.2); }
  .month-weekday { padding: 8px 4px; text-align: center; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #999; }
  .month-days { display: grid; grid-template-columns: repeat(7,1fr); }
  .month-day { min-height: 88px; padding: 5px; border-right: 1px solid rgba(200,169,110,0.12); border-bottom: 1px solid rgba(200,169,110,0.12); }
  .month-day:nth-child(7n) { border-right: none; }
  .month-day.other-month .day-num { color: #ccc; }
  .day-num { font-size: 0.75rem; font-weight: 500; color: #aaa; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-bottom: 3px; }
  .month-day.today .day-num { background: var(--moss); color: white; border-radius: 50%; font-weight: 700; }
  .day-event { font-size: 0.66rem; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; transition: opacity 0.15s; }
  .day-event:hover { opacity: 0.75; }
  .day-event.ev-active { background: rgba(90,110,74,0.14); color: #3d5030; }
  .day-event.ev-paused { background: rgba(138,155,168,0.18); color: #5a6e7a; }
  .day-event.ev-done { background: rgba(200,169,110,0.2); color: #7a5e2a; }
  .week-container { background: white; border-radius: 14px; border: 1px solid rgba(200,169,110,0.2); overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .week-header { display: grid; grid-template-columns: 50px repeat(7,1fr); background: var(--pale); border-bottom: 1px solid rgba(200,169,110,0.2); }
  .week-header-cell { padding: 10px 4px; text-align: center; font-size: 0.68rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.07em; }
  .week-header-cell.today-col { color: var(--moss); }
  .wday-num { display: block; font-size: 1.05rem; font-weight: 700; color: var(--deep); margin-top: 3px; }
  .today-col .wday-num { background: var(--moss); color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin: 3px auto 0; }
  .week-body { display: grid; grid-template-columns: 50px repeat(7,1fr); }
  .week-time-col { border-right: 1px solid rgba(200,169,110,0.15); min-height: 160px; }
  .week-day-col { border-right: 1px solid rgba(200,169,110,0.12); padding: 8px 4px; min-height: 160px; }
  .week-day-col:last-child { border-right: none; }
  .week-event { font-size: 0.7rem; padding: 5px 6px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; line-height: 1.35; transition: opacity 0.15s; }
  .week-event:hover { opacity: 0.8; }
  .week-event.ev-active { background: rgba(90,110,74,0.12); border-left: 3px solid var(--moss); color: #3d5030; }
  .week-event.ev-paused { background: rgba(138,155,168,0.14); border-left: 3px solid var(--mist); color: #5a6e7a; }
  .week-event.ev-done { background: rgba(200,169,110,0.15); border-left: 3px solid var(--warm); color: #7a5e2a; }
  .week-event strong { display: block; font-size: 0.67rem; margin-bottom: 1px; }
  .upcoming-panel { background: white; border-radius: 14px; border: 1px solid rgba(200,169,110,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
  .upcoming-title { padding: 1rem 1.1rem 0.75rem; font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: var(--deep); border-bottom: 1px solid rgba(200,169,110,0.15); }
  .upcoming-list { padding: 0.5rem 0; }
  .upcoming-item { padding: 0.6rem 1.1rem; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid rgba(200,169,110,0.08); }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-item:hover { background: var(--pale); }
  .ui-name { font-size: 0.78rem; font-weight: 600; color: var(--deep); margin-bottom: 2px; }
  .ui-task { font-size: 0.71rem; color: #888; font-style: italic; }
  .ui-date { font-size: 0.68rem; color: var(--warm); font-weight: 600; margin-top: 3px; }
  .upcoming-empty { padding: 1.5rem 1.1rem; font-size: 0.78rem; color: #bbb; text-align: center; }

  /* MODALS */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(26,22,18,0.6); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(3px); }
  .overlay.open { display: flex; }
  .modal { background: var(--paper); border-radius: 18px; padding: 2rem; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 1.5rem; color: var(--deep); }
  .form-row { margin-bottom: 1rem; }
  .form-row label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 5px; }
  .form-row input, .form-row textarea, .form-row select { width: 100%; padding: 9px 12px; border: 1px solid rgba(200,169,110,0.35); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; background: white; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--moss); }
  .form-row textarea { resize: vertical; min-height: 80px; }
  .form-row input[type=range] { padding: 0; accent-color: var(--moss); border: none; background: none; }
  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-cancel { background: none; border: 1px solid rgba(200,169,110,0.4); padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; color: #888; transition: all 0.2s; }
  .btn-cancel:hover { border-color: #999; color: var(--ink); }
  .btn-save { background: var(--moss); color: white; border: none; padding: 8px 22px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn-save:hover { background: #4a5c3c; }
  .btn-delete { background: none; border: 1px solid rgba(184,92,56,0.4); padding: 8px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; color: var(--rust); margin-right: auto; transition: all 0.2s; }
  .btn-delete:hover { background: rgba(184,92,56,0.08); }
  .event-modal { max-width: 380px; }
  .em-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
  .em-task { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--deep); margin-bottom: 0.5rem; }
  .em-project { font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
  .em-date { font-size: 0.8rem; color: var(--warm); font-weight: 600; margin-bottom: 1.2rem; }
  .em-edit-btn { background: var(--pale); border: none; padding: 7px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; color: var(--ink); transition: background 0.2s; }
  .em-edit-btn:hover { background: #ddd8cc; }

  @media (max-width: 800px) { .cal-layout { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { header{padding:1.25rem 1rem 0} .main{padding:1.25rem 1rem} .projects-grid{grid-template-columns:1fr} .form-2col{grid-template-columns:1fr} .month-day{min-height:55px} .week-header{grid-template-columns:36px repeat(7,1fr)} .week-body{grid-template-columns:36px repeat(7,1fr)} }
</style>
</head>
<body>

<div class="sync-bar" id="syncBar"></div>

<header>
  <div class="header-top">
    <div class="logo-area">
      <h1>Mis Proyectos</h1>
      <p>Centro de seguimiento personal</p>
    </div>
    <div class="header-actions" id="headerActions"></div>
  </div>
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchPage('projects',this)">📋 Proyectos</button>
    <button class="main-tab" onclick="switchPage('calendar',this)">🗓 Calendario</button>
  </div>
</header>

<div id="page-projects" class="page active">
  <div class="main">
    <div class="stats-bar" id="statsBar"></div>
    <div class="projects-grid" id="grid"></div>
  </div>
</div>

<div id="page-calendar" class="page">
  <div class="main">
    <div class="cal-header">
      <div class="cal-nav">
        <button class="btn-nav" onclick="calNav(-1)">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="btn-nav" onclick="calNav(1)">›</button>
        <button class="btn-nav btn-today" onclick="goToday()">Hoy</button>
      </div>
      <div class="cal-view-tabs">
        <button class="cal-view-tab active" onclick="setCalView('month',this)">Mes</button>
        <button class="cal-view-tab" onclick="setCalView('week',this)">Semana</button>
      </div>
    </div>
    <div class="cal-layout">
      <div id="calGrid"></div>
      <div class="upcoming-panel">
        <div class="upcoming-title">📌 Próximos pasos</div>
        <div class="upcoming-list" id="upcomingList"></div>
      </div>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">Nuevo proyecto</h2>
    <div class="form-row"><label>Ícono (emoji)</label><input type="text" id="f-icon" placeholder="🌱" maxlength="4"></div>
    <div class="form-row"><label>Nombre del proyecto</label><input type="text" id="f-name" placeholder="Ej: Podcast Authentic Journeys"></div>
    <div class="form-2col">
      <div class="form-row"><label>Categoría</label>
        <select id="f-category">
          <option>Comunidad</option><option>Contenido</option><option>Terapia</option>
          <option>Familia</option><option>Finanzas</option><option>Escritura</option>
          <option>Construcción</option><option>Otro</option>
        </select>
      </div>
      <div class="form-row"><label>Estado</label>
        <select id="f-status">
          <option value="active">Activo</option>
          <option value="paused">En pausa</option>
          <option value="done">Completo</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Descripción</label><textarea id="f-desc" placeholder="¿De qué se trata este proyecto?"></textarea></div>
    <div class="form-row"><label>Próximo paso concreto</label><input type="text" id="f-next" placeholder="Ej: Grabar intro del episodio 1"></div>
    <div class="form-row"><label>📅 Fecha del próximo paso</label><input type="date" id="f-date"></div>
    <div class="form-row">
      <label>Progreso — <span id="progressVal">30</span>%</label>
      <input type="range" id="f-progress" min="0" max="100" value="30" oninput="document.getElementById('progressVal').textContent=this.value">
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" onclick="deleteProject()" style="display:none">Eliminar</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveProject()">Guardar</button>
    </div>
  </div>
</div>

<!-- EVENT MODAL -->
<div class="overlay" id="overlayEvent" onclick="handleEventOverlayClick(event)">
  <div class="modal event-modal">
    <div class="em-label" id="em-label"></div>
    <div class="em-task" id="em-task"></div>
    <div class="em-project" id="em-project"></div>
    <div class="em-date" id="em-date"></div>
    <div style="display:flex;gap:0.75rem;align-items:center;">
      <button class="em-edit-btn" onclick="editFromEvent()">✏️ Editar proyecto</button>
      <button class="btn-cancel" onclick="closeEventModal()">Cerrar</button>
    </div>
  </div>
</div>

<div class="sync-status" id="syncStatus">
  <span class="sync-dot"></span>
  <span id="syncText">Conectando…</span>
</div>

<script>

/* ── SYNC UI ── */
function setSyncStatus(state, text) {
  const s = document.getElementById('syncStatus');
  const bar = document.getElementById('syncBar');
  s.className = 'sync-status ' + state;
  bar.className = 'sync-bar ' + (state === 'syncing' ? 'syncing' : state === 'error' ? 'error' : '');
  document.getElementById('syncText').textContent = text;
}

/* ── SUPABASE API ── */
async function sbFetch(method, body) {
  const url = `${SUPABASE_URL}/rest/v1/${TABLE}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : 'return=minimal',
  };
  const res = await fetch(method === 'GET' ? `${url}?id=eq.${ROW_ID}` : url, {
    method, headers, body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return method === 'GET' ? res.json() : null;
}

async function loadFromCloud() {
  setSyncStatus('syncing', 'Cargando…');
  try {
    const rows = await sbFetch('GET');
    if (rows && rows.length > 0) {
      projects = rows[0].data;
      projects.forEach(p => { if (!('nextDate' in p)) p.nextDate = ''; });
    } else {
      // First time — upload defaults
      projects = DEFAULTS.map((p,i) => ({...p, id: String(Date.now()+i)}));
      await pushToCloud();
    }
    setSyncStatus('ok', 'Sincronizado');
  } catch(e) {
    console.error(e);
    setSyncStatus('error', 'Sin conexión');
    // Fallback to localStorage
    try {
      const raw = localStorage.getItem('lcca-projects-v2') || localStorage.getItem('lcca-projects-v1');
      if (raw) projects = JSON.parse(raw);
      else projects = DEFAULTS.map((p,i)=>({...p,id:String(Date.now()+i)}));
    } catch(_) {
      projects = DEFAULTS.map((p,i)=>({...p,id:String(Date.now()+i)}));
    }
  }
  renderAll();
}

async function pushToCloud() {
  setSyncStatus('syncing', 'Guardando…');
  // Also save locally as backup
  try { localStorage.setItem('lcca-projects-v2', JSON.stringify(projects)); } catch(_) {}
  try {
    await sbFetch('POST', { id: ROW_ID, data: projects, updated_at: new Date().toISOString() });
    setSyncStatus('ok', 'Guardado ✓');
  } catch(e) {
    console.error(e);
    setSyncStatus('error', 'Error al guardar');
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(pushToCloud, 600);
}

/* ── PROJECTS ── */
function statusLabel(s) { return {active:'Activo',paused:'En pausa',done:'Completo'}[s]||s; }

function renderProjects() {
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.status===currentFilter);
  const counts = {active:0,paused:0,done:0};
  projects.forEach(p => counts[p.status]=(counts[p.status]||0)+1);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill s-active"><span class="dot"></span>${counts.active||0} activos</div>
    <div class="stat-pill s-paused"><span class="dot"></span>${counts.paused||0} en pausa</div>
    <div class="stat-pill s-done"><span class="dot"></span>${counts.done||0} completos</div>`;
  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:2.5rem">🌱</div><p>No hay proyectos aquí todavía.</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(p=>`
    <div class="card ${p.status}" onclick="openModal('${p.id}')">
      <div class="card-icon">${p.icon||'📌'}</div>
      <div class="card-title">${p.name}</div>
      <div class="card-category">${p.category}</div>
      <div class="card-desc">${p.desc||''}</div>
      <div class="card-progress">
        <div class="progress-label"><span>Progreso</span><span>${p.progress||0}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress||0}%"></div></div>
      </div>
      <div class="card-footer">
        <span class="status-badge badge-${p.status}">${statusLabel(p.status)}</span>
        ${p.next?`<span class="next-step">→ ${p.next}</span>`:''}
      </div>
    </div>`).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

/* ── CALENDAR ── */
function toDateStr(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function truncate(s,n) { return s.length>n?s.slice(0,n)+'…':s; }
function formatDateES(ds) { if(!ds)return''; const[y,m,d]=ds.split('-'); return `${parseInt(d)} de ${MONTHS_ES[parseInt(m)-1]} ${y}`; }
function buildEvMap() { const m={}; projects.filter(p=>p.nextDate).forEach(p=>{if(!m[p.nextDate])m[p.nextDate]=[];m[p.nextDate].push(p);}); return m; }

function calNav(dir) {
  if(calView==='month') calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);
  else calDate=new Date(calDate.getTime()+dir*7*86400000);
  renderCalendar();
}

function goToday() { calDate=new Date(); renderCalendar(); }

function setCalView(v,btn) {
  calView=v;
  document.querySelectorAll('.cal-view-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
}

function renderCalendar() { if(calView==='month') renderMonth(); else renderWeek(); renderUpcoming(); }

function renderMonth() {
  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('calTitle').textContent=`${MONTHS_ES[m]} ${y}`;
  const todayStr=toDateStr(new Date()), evMap=buildEvMap();
  const first=new Date(y,m,1), startDow=first.getDay(), last=new Date(y,m+1,0);
  let days='';
  for(let i=0;i<startDow;i++){const d=new Date(y,m,1-startDow+i),ds=toDateStr(d);days+=`<div class="month-day other-month"><div class="day-num">${d.getDate()}</div>${(evMap[ds]||[]).map(p=>`<div class="day-event ev-${p.status}" onclick="showEventModal('${p.id}')">${p.icon||'📌'} ${truncate(p.name,16)}</div>`).join('')}</div>`;}
  for(let d=1;d<=last.getDate();d++){const ds=toDateStr(new Date(y,m,d));days+=`<div class="month-day ${ds===todayStr?'today':''}"><div class="day-num">${d}</div>${(evMap[ds]||[]).map(p=>`<div class="day-event ev-${p.status}" onclick="showEventModal('${p.id}')">${p.icon||'📌'} ${truncate(p.name,16)}</div>`).join('')}</div>`;}
  const endDow=last.getDay();
  for(let i=1;i<=6-endDow;i++){const d=new Date(y,m+1,i),ds=toDateStr(d);days+=`<div class="month-day other-month"><div class="day-num">${d.getDate()}</div>${(evMap[ds]||[]).map(p=>`<div class="day-event ev-${p.status}" onclick="showEventModal('${p.id}')">${p.icon||'📌'} ${truncate(p.name,16)}</div>`).join('')}</div>`;}
  document.getElementById('calGrid').innerHTML=`<div class="month-grid"><div class="month-weekdays">${DAYS_ES.map(d=>`<div class="month-weekday">${d}</div>`).join('')}</div><div class="month-days">${days}</div></div>`;
}

function renderWeek() {
  const todayStr=toDateStr(new Date()), dow=calDate.getDay();
  const ws=new Date(calDate.getTime()-dow*86400000), we=new Date(ws.getTime()+6*86400000);
  document.getElementById('calTitle').textContent=`${ws.getDate()} ${MONTHS_ES[ws.getMonth()].slice(0,3)} – ${we.getDate()} ${MONTHS_ES[we.getMonth()].slice(0,3)} ${we.getFullYear()}`;
  const evMap=buildEvMap(), days=Array.from({length:7},(_,i)=>new Date(ws.getTime()+i*86400000));
  const hdr=`<div class="week-header"><div class="week-header-cell"></div>${days.map(d=>{const ds=toDateStr(d),isT=ds===todayStr;return`<div class="week-header-cell ${isT?'today-col':''}">${DAYS_ES[d.getDay()]}<span class="wday-num">${d.getDate()}</span></div>`;}).join('')}</div>`;
  const body=`<div class="week-body"><div class="week-time-col"></div>${days.map(d=>{const ds=toDateStr(d),evs=evMap[ds]||[];return`<div class="week-day-col">${evs.map(p=>`<div class="week-event ev-${p.status}" onclick="showEventModal('${p.id}')"><strong>${p.icon||'📌'} ${truncate(p.name,18)}</strong>${p.next?`<span style="font-size:0.66rem;color:#999;">${truncate(p.next,28)}</span>`:''}</div>`).join('')}</div>`;}).join('')}</div>`;
  document.getElementById('calGrid').innerHTML=`<div class="week-container">${hdr}${body}</div>`;
}

function renderUpcoming() {
  const todayStr=toDateStr(new Date());
  const upcoming=projects.filter(p=>p.nextDate&&p.nextDate>=todayStr).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
  const el=document.getElementById('upcomingList');
  if(!upcoming.length){el.innerHTML=`<div class="upcoming-empty">Sin pasos con fecha asignada.<br><br>Editá un proyecto y agregá una fecha al próximo paso.</div>`;return;}
  el.innerHTML=upcoming.map(p=>`<div class="upcoming-item" onclick="showEventModal('${p.id}')"><div class="ui-name">${p.icon||'📌'} ${p.name}</div><div class="ui-task">${p.next||'—'}</div><div class="ui-date">📅 ${formatDateES(p.nextDate)}</div></div>`).join('');
}

/* ── PROJECT MODAL ── */
function openModal(id) {
  editingId=id||null;
  const del=document.getElementById('btnDelete');
  if(id){
    const p=projects.find(x=>String(x.id)===String(id)); if(!p)return;
    document.getElementById('modalTitle').textContent='Editar proyecto';
    document.getElementById('f-icon').value=p.icon||'';
    document.getElementById('f-name').value=p.name||'';
    document.getElementById('f-category').value=p.category||'Otro';
    document.getElementById('f-status').value=p.status||'active';
    document.getElementById('f-desc').value=p.desc||'';
    document.getElementById('f-next').value=p.next||'';
    document.getElementById('f-date').value=p.nextDate||'';
    document.getElementById('f-progress').value=p.progress||0;
    document.getElementById('progressVal').textContent=p.progress||0;
    del.style.display='block';
  } else {
    document.getElementById('modalTitle').textContent='Nuevo proyecto';
    ['f-icon','f-name','f-desc','f-next','f-date'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-category').value='Otro';
    document.getElementById('f-status').value='active';
    document.getElementById('f-progress').value=30;
    document.getElementById('progressVal').textContent=30;
    del.style.display='none';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId=null; }
function handleOverlayClick(e) { if(e.target===document.getElementById('overlay'))closeModal(); }

function saveProject() {
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('El nombre es obligatorio.');return;}
  const data={
    icon:document.getElementById('f-icon').value.trim()||'📌', name,
    category:document.getElementById('f-category').value,
    status:document.getElementById('f-status').value,
    desc:document.getElementById('f-desc').value.trim(),
    next:document.getElementById('f-next').value.trim(),
    nextDate:document.getElementById('f-date').value,
    progress:parseInt(document.getElementById('f-progress').value),
  };
  if(editingId){
    const idx=projects.findIndex(p=>String(p.id)===String(editingId));
    if(idx!==-1)projects[idx]={...projects[idx],...data};
  } else {
    projects.push({...data,id:String(Date.now())});
  }
  closeModal(); renderAll(); scheduleSave();
}

function deleteProject() {
  if(!editingId)return;
  if(!confirm('¿Eliminar este proyecto?'))return;
  projects=projects.filter(p=>String(p.id)!==String(editingId));
  closeModal(); renderAll(); scheduleSave();
}

/* ── EVENT MODAL ── */
function showEventModal(id) {
  const p=projects.find(x=>String(x.id)===String(id)); if(!p)return;
  viewingEventId=id;
  document.getElementById('em-label').textContent=p.category+' · '+statusLabel(p.status);
  document.getElementById('em-task').textContent=p.next||'—';
  document.getElementById('em-project').textContent=`${p.icon||'📌'} ${p.name}`;
  document.getElementById('em-date').textContent=p.nextDate?'📅 '+formatDateES(p.nextDate):'';
  document.getElementById('overlayEvent').classList.add('open');
}

function closeEventModal() { document.getElementById('overlayEvent').classList.remove('open'); viewingEventId=null; }
function handleEventOverlayClick(e) { if(e.target===document.getElementById('overlayEvent'))closeEventModal(); }
function editFromEvent() { closeEventModal(); openModal(viewingEventId); }

loadFromCloud();
